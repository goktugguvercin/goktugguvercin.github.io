        </header>

        <main class="space-y-5" id="qaList"></main>

        <footer class="mt-20 text-center text-sm text-gray-secondary font-serif opacity-70">

        </footer>
    </div>

    <script>
        const qaData = [
            {
                question: "You have an image processing and transformation pipeline. How can you make it reusable and portable for the teams in the company?",
                answer: `<p>When we implement a pipeline, framework, or a module, we generally would like to transition it from application layout to a distributed library. This enables other teams to simply install it as a utility package, preventing us from having to re-implement similar logic multiple times or copy source code across repositories. In this process, we bundle our codebase and its core functions into a standard, distributable package. When other team members install this package into their own unique projects, it starts to function as a library. They can then simply import our modules and call our functions directly inside their codebase. This directly increases reusability. Besides, this approach provides high portability. Since environment dependencies are clearly defined within the package metadata, the pipeline can be cleanly installed and executed identically across any environment.</p>
                <p>To achieve this, we utilize <code>pyproject.toml</code> file, which acts as our project's metadata blueprint. First, we execute <code>python -m build</code> inside the repository. By this execution, the standard build package consumes our TOML configuration, checks the <code>[project]</code> metadata, collects the source code from <code>src/</code> directory, and bundles it into the artifacts, which are wheel (<code>.whl</code>) and source tarball (<code>.tar.gz</code>) under the <code>dist/</code> directory.</p>
                <p>Once these files are generated, we use a publishing tool like <code>twine</code> to upload them securely to an internal package registry, such as AWS CodeArtifact or Google Artifact Registry, making the utility instantly available for company-wide installation.</p>
                <p>PyPI (Python Package Index) is a huge public library where Python community members go to download public packages like <code>numpy</code>, <code>scipy</code>, or <code>pydantic</code> using <code>pip install</code>. Nevertheless, the corporate companies only prefer to publish their proprietary libraries and frameworks internally to protect their intellectual property, which is exactly where managed services like AWS CodeArtifact and Google Artifact Registry enter the picture. Alternatively, a private PyPI registry can also be self-hosted using open-source tools like <code>pypiserver</code> and deployed onto a simple, budget-friendly virtual private server.</p>`
            },
            {
                question: "How do you define CI/CD, and why is it crucial for modern development?",
                answer: `<p>Continuous Integration (CI) is an automated validation pipeline. When we make some changes on our project codebase, we need to test them to ensure that the system functions correctly. To achieve this,  we write unit and integration tests. CI enables the teams to define an automated pipeline that every time the changes are pushed to a feature branch and submitted through a merge request to the main branch, these changes are validated by the automatic execution of unit and integration tests. If the tests fail, these changes cannot be merged until the issues are resolved.</p>
                <p>Continuous Deployment (CD) is an automated release pipeline. Once the changes have been validated by the Continuous Integration, they are automatically deployed to the target environment without manual intervention. The pipeline builds, packages, and deploys all validated application artifacts whenever changes are merged into the main branch. The main goal is to deliver changes to users quickly, consistently, and reliably, since the manual deployment with multiple steps is prone to possible human errors.</p>
                <p> To implement CI/CD pipelines with GitHub Actions, we define workflow files (<code>.yml</code>) in the <code>.github/workflows</code> directory. These files specify when workflows should run and what actions should be executed. Here, GitHub Actions acts like an automation platform to execute pre-determined tasks by workflow files.</p>`
            }
        ];

        const qaList = document.getElementById('qaList');

        qaData.forEach((item, idx) => {
            const card = document.createElement('div');
            card.className = 'qa-card';
            card.innerHTML = `
                <div class="qa-question" onclick="toggleAnswer(${idx})">
                    <span class="font-semibold text-lg text-dark">${item.question}</span>
                    <span class="qa-arrow text-gold text-sm" id="arrow-${idx}">&#9660;</span>
                </div>
                <div class="qa-answer" id="answer-${idx}">
                    <div class="px-6 pb-5 pt-2 text-dark/85 leading-relaxed space-y-3">
                        ${item.answer}
                    </div>
                </div>
            `;
            qaList.appendChild(card);
        });

        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise();
        }

        function toggleAnswer(idx) {
            const answer = document.getElementById(`answer-${idx}`);
            const arrow = document.getElementById(`arrow-${idx}`);
            answer.classList.toggle('open');
            arrow.classList.toggle('rotated');
        }
    </script>
