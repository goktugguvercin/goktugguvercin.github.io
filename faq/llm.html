    <script>
        const qaData = [
            {
                question: "What is a context window in LLMs?",
                answer: `<p>The context window is the maximum number of tokens that a large language model can receive as input, process, and generate at one time. This includes all tokens coming from the system prompt, user input, conversation history, and the tokens generated as model response. 
                    That is why, as our multi-turn conversation grows longer, more tokens are used, bringing the interaction closer to context window limit.</p>`
            },
            {
                question: "What determines the context window size of an LLM?",
                answer: `<p>The primary factor limiting context window size is the memory and computational complexity of the self-attention mechanism in transformer architectures. Self-attention computes pairwise interactions between every token in the input sequence to calculate attention scores.
                    To accomplish this, the query and key matrices are multiplied ($Q_{(N \\times d)} \\times K^T_{(d \\times N)}$), and the resulting $N \\times N$ attention matrix is stored in memory. This means that computation scales as $\\mathcal{O}(N^2 d)$ and memory is consumed by an $N \\times N$ matrix, where $N$ is at most the context window size.
                    Due to hardware constraints, this quadratic scaling places a practical upper bound on context window size.</p>

                    <p>A secondary factor is positional encoding. Earlier transformer models used absolute learned positional embeddings, defined as a fixed lookup table on an embedding layer. This approach required knowing the maximum sequence length at training time, making it inherently rigid.
                    Modern architectures have largely moved to Rotary Positional Embedding (RoPE), which encodes relative position rather than absolute. This allows better generalization to sequence lengths not seen during training.</p>`
            },
            {
                question: "How can we reduce hallucinations in LLMs?",
                answer: `<p><strong>Strict System Prompts:</strong> We can inject hidden rules and strict instructions in the system prompt to guide the model's behavior and prevent it from fabricating something incorrect. For example, we can write in the system prompt, "Only answer using the provided text. If the answer is not present, reply ‘I do not know’.". This helps steer the model, but does not completely eliminate hallucinations.</em></p>
                <p><strong>Retrieval Augmented Generation:</strong> RAG enables us to embed the user query, perform similarity search against a vector database of pre-embedded document chunks, retrieve the most relevant passages, and provide them as grounded context for the model to use while generating an answer. In this way, the model relies on verified, factual information rather than solely on its parametric knowledge.</p>
                <p><strong>Using Lower Temperature:</strong> Temperature controls how much randomness and determinism will be allowed when the model predicts the next token. If we use a lower temperature, the model will predict what it exactly learned from the dataset it was trained on. This makes the generated output more deterministic and thereby reducing the hallucination. However, it does not guarantee correctness, if the underlying training data contains inaccuracies.</p>
                <p><strong>Self-Consistency and Secondary LLM:</strong> This is actually a post-generation guardrail against hallucinations. We can generate multiple answers and compare them for consistency, or use a secondary model to verify the output of the primary model. This helps detect and filter potentially hallucinated responses.</p>`
            },
            {
                question: "What are the common metrics to evaluate text generation?",
                answer: `<p><strong>BLEU:</strong> This metric measures n-gram overlap between the generated text and a reference text, and is widely used in machine translation. It focuses on precision: Of all n-grams in the generated text, how many of them appear in the reference text.</p>
                <p><strong>ROUGE:</strong> It is similar to BLEU, but it focuses on recall rather than precision: Of all n-grams in the reference text, how many of them appear in the generated text. This metric is designed for summarization.</p>
                <p><strong>BERTScore:</strong> Instead of exact word matching, this metric computes cosine similarity between contextual embeddings of tokens in the generated and reference texts. This allows it to capture semantic similarity, and thereby making it more robust to paraphrasing compared to BLEU and ROUGE.</p>
                <p><strong>METEOR:</strong> This metric was designed to address the limitations of BLEU. It goes beyond exact word matching by also performing stem matching, synonym matching, and paraphrase matching sequentially, where each stage handles the tokens left unmatched by the previous one. Then, it computes both precision and recall, and combines them into an F-score.</p>`
            }
        ];

        const qaList = document.getElementById('qaList');

        qaData.forEach((item, idx) => {
            const card = document.createElement('div');
            card.className = 'qa-card';
            card.innerHTML = `
                <div class="qa-question" onclick="toggleAnswer(${idx})">
                    <span class="font-semibold text-lg text-dark">${item.question}</span>
                    <span class="qa-arrow text-gold text-sm" id="arrow-${idx}">&#9660;</span>
                </div>
                <div class="qa-answer" id="answer-${idx}">
                    <div class="px-6 pb-5 pt-2 text-dark/85 leading-relaxed space-y-3">
                        ${item.answer}
                    </div>
                </div>
            `;
            qaList.appendChild(card);
        });

        // Typeset LaTeX after dynamic content is inserted
        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise();
        }

        function toggleAnswer(idx) {
            const answer = document.getElementById(`answer-${idx}`);
            const arrow = document.getElementById(`arrow-${idx}`);
            answer.classList.toggle('open');
            arrow.classList.toggle('rotated');
        }
