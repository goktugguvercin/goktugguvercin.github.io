    <script>
        const qaData = [
            {
                question: "Why do we need a retrieval-augmented generation pipeline?",
                answer: `<p>Large language models encode their knowledge in the weights, and this is achieved by training them on huge corpus of text. This knowledge is essentially static: to update it with new information, such as recent news, policy changes, or newly published research papers, we need to retrain or fine-tune the model, which is quite expensive and impractical for frequent updates.</p>
                <p>Moreover, open-source and publicly available language models are not trained on an organization's private data, such as regulatory compliance documents, banking policies, tax records, and audit reports. Therefore, they cannot answer any question about these documents. To solve this issue, we could provide the content of the documents in the prompt, but this approach does not scale because LLMs have a limited context window. Although some models, such as Gemini, support very large context windows, this is quite expensive and less effective. It is observed that the model's performance degrades as the context grows. For example, the model misses some important details in the long context.</p>
                <p>Retrieval augmented generation pipelines are developed to solve these two issues. They retrieve the most relevant document chunks from an external knowledge base and augment the prompt with them, enabling the LLM to generate up-to-date and domain-specific responses without modifying the model weights. Besides, we ground the model on retrieved documents, which reduces hallucinations and we can trace the reference, source document.</p>`
            },
            {
                question: "Can you explain how Retrieval-Augmented Generation (RAG) works?",
                answer: `<p>Retrieval-Augmented Generation (RAG) pipelines start with the conversion of the user query into a vector representation using an embedding model. This vector is used to perform a similarity search on a vector database to find and retrieve the most similar top-<em>k</em> chunks. At this point, the value of <em>k</em> is commonly set to a large value to reduce the risk of missing any relevant information, which improves the recall. Nevertheless, this also increases the likelihood of retrieving irrelevant chunks, leading to lower precision.</p>
                <p>To address this trade-off, a re-ranker model is introduced in the architecture to reorder the retrieved chunks based on their relevance to the query and choose the most relevant chunks. Finally, the selected chunks are combined with the user's original query to construct the prompt, which is passed to the large language model.</p>`
            },
            {
                question: "How do we evaluate a RAG pipeline?",
                answer: `<p>Retrieval Augmented Generation pipelines are commonly evaluated by three different metrics: Context Relevance, Faithfulness, and Answer Relevance. They are commonly called the RAG Triad, and their measurement is based on LLM-as-a-Judge.</p>
                <ul class="list-disc pl-6 space-y-1">
                    <li><strong>Context Relevance:</strong> It evaluates whether the retrieved chunks are relevant to the user's query. If the chunks are annotated, this metric can be computed using a formula. Nevertheless, since ground-truth labels are often unavailable in real-world applications, it is commonly measured using an LLM-as-a-Judge. It assesses the quality of the retrieval stage.</li>
                    <li><strong>Faithfulness:</strong> It evaluates whether the generated response is factually supported by the retrieved context. A language model is configured to decompose the response into individual claims and verify whether each claim is supported by the retrieved context. The resulting score is typically normalized to the range 0-1. High scores mean that the response is well grounded on retrieved evidence and contains fewer hallucinations. This metric assesses the quality of the generation stage.</li>
                    <li><strong>Answer Relevance:</strong> It evaluates whether the generated response directly answers the user query. For its evaluation, a language model compares the query with the generated response and assigns a relevance score, typically between 0 and 1.</li>
                </ul>`
            },
            {
                question: "Why do we need chunking?",
                answer: `<p>If we do not apply any chunking strategy in a RAG system, we would have to index entire documents in the vector database. This introduces two major problems. First, computing the similarity between a user's query and a whole document is often ineffective because this document typically covers different, multiple topics in different aspects. As a result, the embedding vector captures the overall meaning of the document rather than the specific information relevant to the query, reducing retrieval accuracy.</p>
                <p>Second, even if we get a high similarity score and retrieve the correct document, adding the entire document to the prompt is inefficient. It significantly increases the number of input tokens, leading to higher inference costs and potentially exceeding the model's context window. In addition to this, our LLM has difficulty focusing on the most relevant information, resulting in the generation of less precise and concentrated responses. That is why, retrieving isolated, short, but precise chunks is important. This improves retrieval accuracy, reduces token usage and inference cost, and enables the language model to generate more focused and accurate responses.</p>`
            },
            {
                question: "Can you explain some chunking strategies?",
                answer: `<p><strong>Recursive Chunking:</strong> Recursive chunker receives a list of characters as separators. It splits the text into sub units by using each of those separators in given order. The next separator is used only when resulting chunks are still larger than chunk size. Consecutive chunks are merged if their merged size is still lower than target chunk size.</p>
                <p><strong>Semantic Chunking:</strong> Semantic chunker breaks the text into individual sentences. Then, overlapping groups of three consecutive sentences (sentence triplets) are comprised by sliding window approach, and an embedding vector is computed for each triplet. We compare embedding vectors of consecutive triplets by using cosine or euclidean distance to measure context similarity. If computed score is lower than pre-determined threshold, this means that the topic and context start to change at that point, where the current chunk is being concluded and the next chunk is started.</p>
                <p><strong>Document-based Chunking:</strong> Document chunkers use internal structure of the documents to determine the chunks. <code>HTMLTextSplitter</code>, <code>MarkdownHeaderTextSplitter</code> and <code>LatexTextSplitter</code> are some document chunkers provided by LangChain. For example, markdown splitter focuses on the headings, and it uses header characters to capture sections and sub-sections.</p>
                <p><strong>LLM-based Chunking:</strong> An LLM model is used to identify logically similar sections. Then, it summarizes them into smaller meaning-preserving chunks.</p>`
            },
            {
                question: "How does Elasticsearch implement hybrid search (Lexical + Semantic)?",
                answer: `<p>Elasticsearch was originally a keyword-based search engine, but now it also supports semantic search.</p>
                <p>Its lexical component as keyword search uses an inverted index to quickly look up and identify which documents contain the query words. The main strategy that it follows is <strong>Best Match 25 (BM25)</strong> algorithm, not only checking whether a word appears in the document or not, but also calculating relevance score based on Term Frequency and Inverse Document Frequency.</p>
                <p>For semantic search, the system leverages dense embedding vectors to retrieve content based on contextual meaning. Because comparing millions of mathematical vectors sequentially would be too slow, the system employs the <strong>Hierarchical Navigable Small World (HNSW)</strong> algorithm. As a specific variant of Approximate Nearest Neighbor (ANN) search, HNSW constructs a proximity graph where dense vectors act as nodes and their mutual similarities define the edges. This architecture achieves logarithmic complexity ($O(\log N)$), effectively creating a "highway system" that allows the engine to bypass irrelevant regions of the graph and rapidly locate close neighbors.</p>
                <p>Currently, Elasticsearch combines these two approaches to perform hybrid search using the <strong>Reciprocal Rank Fusion (RRF)</strong> algorithm. RRF runs a BM25 lexical query and an HNSW vector query simultaneously, intelligently merging those two scoreboards to deliver highly optimized, top-tier results.</p>`
            },
            {
                question: "What are multimodal embeddings and how do they enable cross-modal retrieval?",
                answer: `<p><strong>Multimodal embeddings</strong> are deep learning models that take inputs from different data modalities, such as text, images, video, and audio, and map them into a shared vector space. This provides a unified representation space, enabling semantic search and retrieval between different data types. For example, a text query explaining a specific incident can be used to retrieve relevant images of the same scenari, called as <strong>cross-modal retrieval</strong>.</p>`
            }
        ];

                <div class="qa-answer" id="answer-${idx}">
                    <div class="px-6 pb-5 pt-2 text-dark/85 leading-relaxed space-y-3">
                        ${item.answer}
                    </div>
                </div>
            `;
            qaList.appendChild(card);
        });
