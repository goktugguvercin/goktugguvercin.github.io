    <script>
        const qaData = [
            {
                question: "A/B Test in Model Deployment?",
                answer: `<p>In production, the currently deployed model is referred to as the control (Model A), while the newly developed model is the treatment (Model B). Although Model B may outperform Model A on offline evaluation metrics, such improvements are not always reflected to real-world performance.</p>
                <p>Therefore, we conduct an online A/B test before fully rolling it out. In this setup, a small portion of traffic is routed to Model B, while the remaining 90% continues to be served by Model A. The routing is performed at the user level to ensure a consistent experience.</p>
                <p>To evaluate performance, we collect user-driven signals. In particular, we incorporate a feedback mechanism:</p>
                <ul class="list-disc pl-6 space-y-1">
                    <li>If content is flagged as harmful, users can confirm or reject the decision.</li>
                    <li>If content is not flagged, users can report it as harmful.</li>
                </ul>`
            },
            {
                question: "What is NGINX and why is it used with Uvicorn?",
                answer: `<p>Uvicorn is an ASGI server that listens for HTTP requests and returns responses for applications such as FastAPI. However, it is not designed to act as a full internet-facing gateway. It lacks advanced protections such as robust handling of slow clients, built-in rate limiting, and strong filtering of malformed or malicious traffic at the network level. While it supports HTTPS, it does not provide the same level of robustness and operational features as dedicated web servers or reverse proxies.</p>
                <p>Because of these limitations, Uvicorn is typically placed behind a reverse proxy in production, such as NGINX or Caddy. These proxies can buffer requests, enforce rate limiting, and protect against abusive traffic. In addition, they handle TLS termination, managing SSL certificates, encrypting traffic with clients, and forwarding requests to Uvicorn over plain HTTP internally.</p>`
            },
            {
                question: "What is Docker and what problems does it solve?",
                answer: `<p>Docker is a software platform that enables us to package our software applications and also AI models together with their dependencies, system libraries, and specific python runtime into a self-contained, completely isolated unit called a Docker Image.</p>
                <p>Executing and deploying an application requires manually setting up an infrastructure on the host server. This means upgrading system-level packages, defining some user permissions, configuring environment variables, creating a virtual environment, and managing version conflicts.</p>
                <ul class="list-disc pl-6 space-y-1">
                    <li><strong><em>Hidden System Dependencies:</em></strong> Some computer vision and AI libraries rely on low-level C++ binaries. For instance, OpenCV indirectly requires <code>libGL.so</code>, which is a core system library for OpenGL. Without Docker, we have to manually run <code>sudo apt-get install</code> on the server to get rid of possible runtime errors.</li>
                    <li><strong><em>Permission Management:</em></strong> If our application needs to write log files or save user uploads, we must configure Linux file permissions and user groups on the host.</li>
                </ul>
                <p>The main drawback is that these tasks are handled at the system level. In other words, we directly interact with the server. As a result, the entire configuration becomes tightly coupled to that server. If we want to run the application on another machine, we need to replicate the exact same setup again.</p>
                <p>Docker images solve this by completely isolating the project and its workspace from the physical server. Technically, we shift the responsibility of environment management from the server to the code artifact. Docker images can run anywhere; that is why, it eliminates the classic <em>'it works on my machine'</em> problem but also provides true application portability.</p>`
            },
            {
                question: "What is the difference between a Dockerfile, a Docker image, and a Docker container?",
                answer: `<p>A Dockerfile is a plain text file that contains a set of instructions used to build a Docker image. These instructions are read and executed by Docker Engine to create a packaged software application environment. Ultimately, a Dockerfile serves as the essential recipe or blueprint for generating Docker images.</p>
                <p>A Docker Image is actually a package that contains application source code, binaries, necessary libraries, dependencies and configuration files to run the application. However, an image itself is not executable. It has static and inactive structure. It is simply a snapshot of the application's environment. This snapshot must remain consistent and reusable; that is why, Docker stores it as an immutable (read-only) artifact.</p>
                <p>When Docker starts an application, it does not run the image directly. Instead, it creates a Docker Container from the image. The container is a running instance of a Docker image. An analogy from object-oriented programming is that a Docker Image is the definition of a class, and the objects instantiated from that class refer to the multiple containers. This means that multiple containers can be created from the same image while the original image remains unchanged.</p>
                <p>Docker images are composed of multiple immutable layers. These layers record filesystem changes. When a container is created, Docker adds a thin writable layer on top of the image's read-only layers. This writable layer is unique to each container and stores any changes made while the container is running. As a result, containers share the underlying image layers but maintain their own writable layer. If a container is deleted, its writable layer is removed as well, while the underlying image layers remain unchanged and can be reused to create new containers.</p>`
            }
        ];

        const qaList = document.getElementById('qaList');

        qaData.forEach((item, idx) => {
            const card = document.createElement('div');
            card.className = 'qa-card';
            card.innerHTML = `
                <div class="qa-question" onclick="toggleAnswer(${idx})">
                    <span class="font-semibold text-lg text-dark">${item.question}</span>
                    <span class="qa-arrow text-gold text-sm" id="arrow-${idx}">&#9660;</span>
                </div>
                <div class="qa-answer" id="answer-${idx}">
                    <div class="px-6 pb-5 pt-2 text-dark/85 leading-relaxed space-y-3">
                        ${item.answer}
                    </div>
                </div>
            `;
            qaList.appendChild(card);
        });

        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise();
        }

        function toggleAnswer(idx) {
            const answer = document.getElementById(`answer-${idx}`);
            const arrow = document.getElementById(`arrow-${idx}`);
            answer.classList.toggle('open');
            arrow.classList.toggle('rotated');
        }
    </script>
