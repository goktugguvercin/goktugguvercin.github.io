    <script>
        const qaData = [
            {
                question: "How do you define an AI agent and how does it work?",
                answer: `<p>An AI agent is a system that orchestrates large language models together with external tools, APIs, memory, and retrieval mechanisms to plan and carry out the tasks autonomously. A language model serves as a reasoning and planning engine: It analyzes the user request, decides which actions or operations are needed, calls the appropriate tools to handle these actions, observes their outputs, updates its state, and repeats this process until the target task is completed. Traditional LLM applications follow a pre-determined, fixed workflow, whereas AI agents dynamically determine their own execution path through an iterative agent loop, based on the current state and the user's request.</p>`
            },
            {
                question: "What is the role of planning in AI agents?",
                answer: `<p>Planning is the process of decomposing a complex user request into a sequence of smaller actions required to accomplish the task. In modern agentic systems, the language model is typically responsible for planning. Based on the user's request, the main objective, and the current state, it determines which actions are required, selects the appropriate tools to perform those actions, and decides the order in which they should be invoked. In this process, reasoning is about understanding the current situation and drawing conclusions, such as <em>"I need the customer's account balance before I can answer this question."</em> Planning builds on this reasoning by determining the workflow and steps.</p>`
            },
            {
                question: "What is tool calling and how does it work?",
                answer: `<p>Large language models are capable of thinking, reasoning, generating text, and making some decisions. However, they cannot search the web, retrieve the documents, access databases, execute API calls, process documents, and send emails. These capabilities extend beyond the native functionalities of the language models, and they are exposed as the tools integrated in agentic AI systems. In practice, these tools are implemented as functions or other executable components, such as scripts or services. When the language model determines that a tool is needed, it generates a structured function call request, typically represented as JSON to contain the function name and necessary input arguments. The language model does not execute the function itself; instead, the surrounding application interprets the JSON, invokes the corresponding function, and returns the result to the model. The language model then continues its reasoning based on the updated state, repeating this process until the task is completed.</p>`
            },
            {
                question: "What is Model Context Protocol (MCP), and what problems does it solve?",
                answer: `<p>Model Context Protocol (MCP) is an open standard that defines how AI applications access and communicate with external tools. Without MCP, we typically implement custom wrapper functions around external APIs or SDKs and integrate them into our AI applications. For example, if we want to process a PDF document, we might implement a function called <code>process_document()</code>, which internally invokes the Mistral OCR API to extract the document's content. If another team, business unit, or company builds a different AI application and also needs document processing, it often has to implement and maintain a similar integration. MCP standardizes this integration layer by allowing tools to be exposed through MCP servers, enabling any MCP-compatible AI application to discover and invoke those tools through a common protocol instead of repeatedly implementing custom wrappers.</p>`
            },
            {
                question: "Who implements an MCP server, and what if a tool doesn't have one yet?",
                answer: `<p>An MCP server is ideally implemented and exposed by the owner of the external tools, since they know their APIs and SDKs best. For example, Mistral could expose its OCR capabilities through an official MCP server. However, MCP is an open standard, not a requirement. If the owner does not expose an MCP server, we can still integrate its REST APIs or SDKs by implementing custom wrapper functions, as is traditionally done, or we can develop our own MCP server that wraps the existing APIs and exposes them through the MCP protocol. Once it is implemented and exposed, it becomes reusable. All AI applications communicate with the same MCP server. This improves maintainability, consistency, and interoperability across different AI systems.</p>`
            },
            {
                question: "What is the relationship between function calling, locally-implemented functions, and Model Context Protocol?",
                answer: `<p>Function calling is the mechanism that enables a language model to request the execution of external tools. The model decides which tool is needed and generates a structured function call, represented as JSON, containing the function name and its input arguments. So, function calling has three main pillars: tool selection, argument construction, and structured output generation.</p>
                <p>The generated function call is then delivered to the agent, which is responsible for executing it. Without MCP, we implement local wrapper functions around external APIs or SDKs, register them as available tools for the language model, and invoke them when they are requested. For example, a local function named <code>process_document()</code> may internally call the Mistral OCR REST API.</p>
                <p>With MCP, these wrapper functions are no longer implemented inside the agent. Instead, they are implemented and exposed through an MCP server. When the agent connects to that MCP server using our MCP client, it automatically discovers the available tools together with their descriptions and input schemas. The agent then registers these discovered tools with the language model in exactly the same way it registers locally implemented functions.</p>
                <p>From the language model's perspective, nothing changes. It still selects the appropriate tool and generates the same JSON function call. The difference is that the actual tool implementation resides on the MCP server rather than inside the agent. The application forwards the generated function call to the MCP client, which communicates with the MCP server. This server executes the requested tool and returns the result to the agent. Finally, our agent passes the result back to the language model so that it can continue its reasoning.</p>
                <p>As a result, function calling and MCP are complementary rather than competing technologies. Function calling defines which tool should be executed and with which arguments, whereas MCP standardizes how AI applications discover and communicate with external tool implementations.</p>`
            }
        ];

        const qaList = document.getElementById('qaList');

        qaData.forEach((item, idx) => {
            const card = document.createElement('div');
            card.className = 'qa-card';
            card.innerHTML = `
                <div class="qa-question" onclick="toggleAnswer(${idx})">
                    <span class="font-semibold text-lg text-dark">${item.question}</span>
                    <span class="qa-arrow text-gold text-sm" id="arrow-${idx}">&#9660;</span>
                </div>
                <div class="qa-answer" id="answer-${idx}">
                    <div class="px-6 pb-5 pt-2 text-dark/85 leading-relaxed space-y-3">
                        ${item.answer}
                    </div>
                </div>
            `;
            qaList.appendChild(card);
        });

        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise();
        }

        function toggleAnswer(idx) {
            const answer = document.getElementById(`answer-${idx}`);
            const arrow = document.getElementById(`arrow-${idx}`);
            answer.classList.toggle('open');
            arrow.classList.toggle('rotated');
        }
    </script>
