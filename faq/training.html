    <script>
        const qaData = [
            {
                question: "What is catastrophic forgetting?",
                answer: `<p>Catastrophic forgetting is a phenomenon observed in neural networks where a model loses previously learned knowledge when it is trained sequentially on new tasks or data. As the model’s weights are updated to learn the new task or domain, the information learned from earlier tasks can be overwritten and vanished. As a result, training a model sequentially on multiple tasks does not naturally lead to incremental learning, since the model tends to forget earlier knowledge while adapting to new data.</p>`
            },
            {
                question: "How can we mitigate catastrophic forgetting?",
                answer: `<p>There are several approaches to mitigate catastrophic forgetting:</p>
                <p><strong>Linear Probing and Fine-tuning (LP-FT) with Warmup:</strong> A two-stage approach that first trains only the classification head (linear probing), then fine-tunes the full model with a warmup schedule.</p>
                <p><strong>LoRA (Low-Rank Adaptation):</strong> LoRA freezes the original attention weights, and learns small adapter matrices. These adapters are mostly added to Q-K-V projections in parallel, but if we need more aggressive adaptation, output projection in attention layers and the following MLP modules can be also supported with these adapters. Since LoRA preserves the original weights, catastrophic forgetting is less observed.</p>
                <p>However, preserving model weights is not exactly same as preserving model's behavior. Original weights and adapter matrices are used together in inference stage. Since these matrices are only updated to fit in the new specialist task, what it learnt can overshadow or conflict with original weights. This partially triggers behavior change and catastrophic forgetting.</p>
                <p><strong>Orthogonal Projection LoRA (OPLoRA):</strong> OPLoRA solves this problem. It first runs SVD on each attention weight matrix to identify singular directions where core pre-trained knowledge is concentrated. Then, it projects all LoRA updates to be orthogonal to those directions.</p>`
            }
        ];

        const qaList = document.getElementById('qaList');

        qaData.forEach((item, idx) => {
            const card = document.createElement('div');
            card.className = 'qa-card';
            card.innerHTML = `
                <div class="qa-question" onclick="toggleAnswer(${idx})">
                    <span class="font-semibold text-lg text-dark">${item.question}</span>
                    <span class="qa-arrow text-gold text-sm" id="arrow-${idx}">&#9660;</span>
                </div>
                <div class="qa-answer" id="answer-${idx}">
                    <div class="px-6 pb-5 pt-2 text-dark/85 leading-relaxed space-y-3">
                        ${item.answer}
                    </div>
                </div>
            `;
            qaList.appendChild(card);
        });

        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise();
        }

        function toggleAnswer(idx) {
            const answer = document.getElementById(`answer-${idx}`);
            const arrow = document.getElementById(`arrow-${idx}`);
            answer.classList.toggle('open');
            arrow.classList.toggle('rotated');
        }
    </script>
