<svg width="100%" viewBox="0 0 680 510" role="img" style="" xmlns="http://www.w3.org/2000/svg">
<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">ONNX inference service on GKE with a Cloud SQL Proxy sidecar</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">A browser sends HTTPS requests to a GCP load balancer that holds the public IP and terminates TLS. The load balancer is provisioned by a Kubernetes Ingress manifest. Plain HTTP traffic then enters the GKE cluster and reaches a Service, which provides a stable internal endpoint and routes the request to a Pod. The Pod contains two containers sharing the same network: a FastAPI application running ONNX inference, and a Cloud SQL Proxy running as a sidecar. The sidecar brokers a connection from the app to a managed Cloud SQL database living outside the cluster. The Pod is managed by a Deployment manifest.</desc>
